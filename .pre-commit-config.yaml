repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        additional_dependencies:
          - typer>=0.12
          - pydantic>=2.0
          - platformdirs>=4.0
          - rich>=13
          - jsonschema>=4.20
        args: [--strict, --python-version=3.10]
        pass_filenames: false
        files: ^src/

  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: uv run pytest -x -q --no-header
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]
